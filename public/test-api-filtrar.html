<!DOCTYPE html>
<html>
<head>
    <title>Test API Filtrar Dengue</title>
    <meta name="csrf-token" content="test-token">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        pre { background: #f5f5f5; padding: 10px; border-radius: 3px; max-height: 400px; overflow: auto; }
        button { padding: 8px 16px; margin: 5px; }
    </style>
</head>
<body>
    <h1>Test API Filtrar Dengue</h1>
    <button onclick="testFiltrar()">Probar API Filtrar</button>
    <div id="result"></div>

    <script>
        function testFiltrar() {
            // Establecer sesión primero
            fetch('/simular-login/1')
                .then(() => {
                    // Obtener token CSRF
                    return fetch('/registros-dengue');
                })
                .then(response => response.text())
                .then(html => {
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(html, 'text/html');
                    const csrfToken = doc.querySelector('meta[name="csrf-token"]')?.getAttribute('content');

                    if (!csrfToken) {
                        throw new Error('No se pudo obtener token CSRF');
                    }

                    // Probar API de filtrar
                    return fetch('/registros-dengue/filtrar', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/x-www-form-urlencoded',
                            'X-CSRF-TOKEN': csrfToken,
                            'Accept': 'application/json'
                        },
                        body: new URLSearchParams({
                            pagina: 1,
                            cantidad: 5,
                            d: '',
                            h: '',
                            reg: '',
                            id_usuario: 0,
                            efector: ''
                        })
                    });
                })
                .then(response => response.json())
                .then(data => {
                    document.getElementById('result').innerHTML = `
                        <h3>Respuesta de API Filtrar:</h3>
                        <p><strong>Success:</strong> ${data.success}</p>
                        <p><strong>Total:</strong> ${data.total}</p>
                        <p><strong>Registros devueltos:</strong> ${data.data ? data.data.length : 0}</p>
                        <h4>Primer registro (si existe):</h4>
                        <pre>${JSON.stringify(data.data && data.data[0] ? data.data[0] : 'No hay datos', null, 2)}</pre>
                        <h4>Respuesta completa:</h4>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                })
                .catch(error => {
                    document.getElementById('result').innerHTML = `<div style="color: red;">Error: ${error.message}</div>`;
                });
        }
    </script>
</body>
</html>
